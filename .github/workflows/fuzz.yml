name: fuzz-testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  # Total wall-clock budget per fuzz target (seconds)
  FUZZ_TIME: 300
  FUZZ_JOBS: 2

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fuzz / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_fuel
          - fuzz_fraction
          - fuzz_fuel_string
          - fuzz_fuel_operations
          - fuzz_fraction_operations
          - fuzz_fee_calculations
          - fuzz_fuel_serialization
          - fuzz_invariant
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry, index and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz
          key: fuzz-${{ matrix.target }}

      - name: Install cargo-fuzz
        # NOTE: `--locked` is intentionally omitted. The lockfile shipped with the
        # cargo-fuzz release pins ancient transitive deps (e.g. `rustix 0.36.5`) whose
        # `cfg_attr(rustc_attrs, rustc_layout_scalar_valid_range_*)` usage is no longer
        # accepted by current nightly rustc — the install would fail to build before
        # any fuzz target ran. Letting cargo resolve fresh transitive versions keeps
        # the install compatible with whichever nightly the matrix happens to pull.
        run: cargo install cargo-fuzz

      - name: Run regular tests
        run: cargo test --all --verbose

      - name: Run fuzz target ${{ matrix.target }}
        working-directory: fuzz
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            --jobs ${{ env.FUZZ_JOBS }} -- \
            -max_total_time=${{ env.FUZZ_TIME }}

      - name: Upload crash artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
