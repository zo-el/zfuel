name: Publish

# Runs only after both the rust-tests and fuzz-testing workflows complete on
# main. The gate job below verifies that BOTH of those workflows succeeded for
# the triggering commit, and only then checks whether the version in Cargo.toml
# is new. The publish job runs only when both conditions are true.
on:
  workflow_run:
    workflows: ["rust-tests", "fuzz-testing"]
    types: [completed]
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write # Required for creating releases and tags
  packages: write # Required for publishing packages
  actions: read # Required for querying sibling workflow runs

# Both test workflows completing will fire this workflow twice for the same
# commit. Serialize per-SHA so we don't race on tag creation / cargo publish.
concurrency:
  group: publish-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  gate:
    name: Gate on CI success and version change
    runs-on: ubuntu-latest
    # Skip immediately if the workflow that triggered us did not succeed.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for tag detection
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Decide whether to publish
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"

          # 1. Require BOTH rust-tests and fuzz-testing to have completed
          #    successfully for this exact commit. If either is still running
          #    or failed we exit cleanly without publishing; when the other
          #    workflow completes it will re-fire this workflow and we'll
          #    re-evaluate.
          ALL_OK=true
          for WF in "main.yml" "fuzz.yml"; do
            RUN=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/$WF/runs?head_sha=$SHA&branch=main" \
              --jq '.workflow_runs[0] // empty')

            if [ -z "$RUN" ]; then
              echo "::notice::No run found yet for $WF at $SHA — waiting"
              ALL_OK=false
              break
            fi

            STATUS=$(echo "$RUN" | jq -r '.status')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion')
            echo "$WF -> status=$STATUS conclusion=$CONCLUSION"

            if [ "$STATUS" != "completed" ]; then
              echo "::notice::$WF is still $STATUS for $SHA — will retry when it completes"
              ALL_OK=false
              break
            fi
            if [ "$CONCLUSION" != "success" ]; then
              echo "::notice::$WF concluded as $CONCLUSION for $SHA — not publishing"
              ALL_OK=false
              break
            fi
          done

          if [ "$ALL_OK" != "true" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Only publish if the version in Cargo.toml has no matching tag.
          VERSION=$(grep -m 1 '^version = ' Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if git tag | grep -qx "v${VERSION}"; then
            echo "::notice::Version $VERSION already tagged — nothing to publish"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Version $VERSION is new — proceeding to publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to crates.io and create release
    needs: gate
    if: ${{ needs.gate.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify GitHub token
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "::error::GITHUB_TOKEN is not available"
            exit 1
          fi
          echo "GITHUB_TOKEN is available"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is not set"
            exit 1
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.gate.outputs.version }}
          tag_name: v${{ needs.gate.outputs.version }}
          body_path: CHANGELOG.md
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
